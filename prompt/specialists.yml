# Registro de Specialist Modes do GolIAs (AtuDIC)
#
# Cada specialist agrupa intents, skills e tools relacionados a um dominio.
# O chat engine seleciona o specialist baseado no intent detectado e usa
# esse registro para filtrar skills e tools no system prompt.
#
# Campos de agente (Fase 2):
#   agent_enabled: true/false — se true, specialist e promovido a sub-agente autonomo
#   agent_budget: tokens maximo para execucao do sub-agente (default: 15000)
#   agent_max_iterations: max tool calls por execucao (default: 5)
#   O prompt do agente e carregado de prompt/specialists/<name>.md
#
# AtuDIC — modulos ativos: Dashboard, CI/CD (pipelines, repositorios, agendamentos),
# Monitoramento (observability, database, processos, auditor), DevWorkspace,
# Conhecimento (agent, knowledge, documentacao), Admin (users, settings).
#
# "Pergunte ao Analista!" — CRUD completo via 59 tools com RBAC

