# =====================================================================
# AtuDIC - Docker Compose
# =====================================================================
# Uso:
#   docker compose up -d          # iniciar
#   docker compose logs -f app    # ver logs
#   docker compose down           # parar
#
# Para produção, crie um arquivo .env com:
#   DB_PASSWORD=senha_segura
#   ENCRYPTION_KEY=chave_fernet_base64
# =====================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-atudic}
      POSTGRES_USER: ${DB_USER:-atudic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-atudic}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_EXPOSE:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-atudic} -d ${DB_NAME:-atudic}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-atudic}
      DB_USER: ${DB_USER:-atudic}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD obrigatoria no .env}
      DB_POOL_MIN: ${DB_POOL_MIN:-1}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - app_logs:/app/logs
      - app_repos:/app/cloned_repos
      - app_encryption:/app/.keys
    env_file:
      - path: .env
        required: false

volumes:
  pgdata:
  app_logs:
  app_repos:
  app_encryption:
