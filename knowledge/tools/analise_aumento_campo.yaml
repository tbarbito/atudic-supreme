id: analise_aumento_campo
name: "Analise de Aumento de Campo Chave"
description: "Analise completa de impacto para aumento de tamanho de campo chave (SXG-aware)"
source: "backend/services/analise_campo_chave.py:43"
when_to_use:
  - "aumentar tamanho de campo"
  - "ampliar campo"
  - "expandir posicoes"
  - "de 15 para 30"
what_it_checks:
  - "grupo SXG do campo — campos que mudam automaticamente"
  - "campos FORA do grupo com F3 na tabela (RISCO — ajuste manual)"
  - "campos custom Z* que referenciam por nome"
  - "fontes com PadR/PADR chumbado (vai TRUNCAR)"
  - "fontes com Space() chumbado"
  - "fontes com SubStr(x, 1, SIZE) — corta valor na posicao fixa"
  - "fontes com Replicate(' ', SIZE) — monta chave com tamanho fixo"
  - "ParamBox com Space(SIZE) — campo de entrada com tamanho fixo"
  - "fontes com TamSX3 dinamico (OK — se adaptam)"
  - "indices que podem estourar limite 250 chars"
  - "MsExecAuto que passam campo com tamanho antigo"
  - "integracoes/WebServices afetadas"
inputs:
  tabela: "codigo da tabela (ex: SB1)"
  campo: "codigo do campo (ex: B1_COD)"
  novo_tamanho: "novo tamanho desejado (0 = apenas analise)"
outputs:
  grupo_sxg: "grupo do campo"
  campos_grupo: "campos que mudam automaticamente"
  campos_fora_grupo: "campos com F3 mas FORA do grupo (RISCO)"
  campos_suspeitos_custom: "campos Z* que podem referenciar"
  padr_chumbado: "fontes com PadR/Space/SubStr/Replicate/ParamBox fixo (alta/media confianca)"
  tamsx3_dinamico: "fontes com TamSX3 (OK)"
  indices_risco: "indices que podem estourar"
  msexecauto: "MsExecAuto afetados"
  integracoes: "integracoes que gravam"
input_schema:
  tabela:
    type: string
    required: true
    pattern: "^[A-Z][A-Z0-9]{2}$"
  campo:
    type: string
    required: true
  novo_tamanho:
    type: number
    required: false
notes: |
  Tamanho chumbado e o maior risco — busca em 2 passadas:
  Pass 1 (alta confianca): menciona o campo diretamente
  Pass 2 (media confianca): esta em fonte que referencia a tabela
  Verifica multiplos tamanhos: atual, alvo, e comuns (15, 20, 23, 25, 30)
  Padroes detectados:
  - PadR(variavel, SIZE) — preenche com espacos ate SIZE
  - Space(SIZE) — cria string de espacos fixa
  - SubStr(variavel, 1, SIZE) — corta valor na posicao fixa
  - Replicate(" ", SIZE) — monta chave com tamanho fixo
  - ParamBox com Space(SIZE) — campo de entrada do usuario com tamanho fixo
  Todos devem usar TamSX3("CAMPO") em vez de numero fixo.
