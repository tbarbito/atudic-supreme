prompts:
  - id: system_duvida
    file: prompts/system_duvida.yaml
    summary: "System prompt modo duvida (entender ambiente)"

  - id: system_melhoria
    file: prompts/system_melhoria.yaml
    summary: "System prompt modo melhoria (criar/alterar)"

  - id: system_ajuste
    file: prompts/system_ajuste.yaml
    summary: "System prompt modo ajuste (debug)"

  - id: classify
    file: prompts/classify.yaml
    summary: "Classificar pergunta → modulos, tabelas, tipo_analise"

  - id: planner
    file: prompts/planner.yaml
    summary: "Prompt do planejador de investigacao"

  - id: verification
    file: prompts/verification.yaml
    summary: "Draft + Verify + Reflect — anti-alucinacao"

  - id: code_specialist
    file: prompts/code_specialist.yaml
    summary: "3 modos: diagnosticar, gerar, ajustar codigo ADVPL"

  - id: analise_pai
    file: prompts/analise_pai.yaml
    summary: "Resumo + Mermaid do processo pai quando decomposto em sub-processos"

# --- Heuristicas: regras e logica de decisao embutida ---
heuristics:
  - id: uso_tabela
    file: heuristics/uso_tabela.yaml
    summary: "Classificacao de uso real de tabela por volumetria (ativo, residual, config, inexistente)"

  - id: tabela_movimento
    file: heuristics/tabela_movimento.yaml
    summary: "Detecta tabela de movimento vs configuracao/cadastro"

  - id: ambiguidade
    file: heuristics/ambiguidade.yaml
    summary: "Quando pedir clarificacao (multiplos campos, keywords ambiguas)"

  - id: verificacao
    file: heuristics/verificacao.yaml
    summary: "Quando rodar verificacao anti-alucinacao (modo, qtd tools, confianca)"

  - id: decomposicao
    file: heuristics/decomposicao.yaml
    summary: "Quando decompor processo (max fontes, tabelas transversais, integracoes)"

  - id: sinonimos
    file: heuristics/sinonimos.yaml
    summary: "Expansao de sinonimos para resolucao semantica"

  - id: grafo_pe_enriquecido
    file: heuristics/grafo_pe_enriquecido.yaml
    summary: "PEs no grafo mostram funcoes do padrao que chamam o ExecBlock"

  - id: tool_error_feedback
    file: heuristics/tool_error_feedback.yaml
    summary: "Erros de tools retornam como feedback pro LLM adaptar estrategia"

  - id: parallel_tools
    file: heuristics/parallel_tools.yaml
    summary: "Tools read-only rodam em paralelo (max 5, asyncio.gather)"

# --- Summarizers: como cada tool tem seu resultado resumido ---
summarizers:
  - id: context_manager
    file: tools/_summarizers.yaml
    summary: "18 summarizers especializados + 6 topicos de organizacao"

# --- Testes: cenarios de validacao por cliente ---
tests:
  - id: shared
    file: tests/_shared/tests.yaml
    summary: "Testes universais que valem para todos os clientes"
