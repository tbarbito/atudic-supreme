# --- Mapas: dados de referencia Protheus ---
maps:
  - id: rotinas
    file: maps/rotinas.yaml
    summary: "50+ rotinas padrao com prefixos, tabela principal e modulo"

  - id: conceitos
    file: maps/conceitos.yaml
    summary: "17 conceitos de negocio mapeados para rotinas e tabelas"

  - id: operacoes
    file: maps/operacoes.yaml
    summary: "7 tipos de operacao com keywords sinonimas"

  - id: action_keywords
    file: maps/action_keywords.yaml
    summary: "9 tipos de acao detectados por keywords na mensagem"

  - id: entity_mapping
    file: maps/entity_mapping.yaml
    summary: "Mapeamento produto/cliente/fornecedor → tabela + campo"

  - id: table_routine_map
    file: maps/table_routine_map.yaml
    summary: "Tabela → rotinas padrao (para detectar MsExecAuto)"

