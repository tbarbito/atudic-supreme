# ============================================================================
# CAPABILITIES.yaml — Mapa completo do raciocinio do Analista Protheus
# ============================================================================
# Este arquivo e o indice central de TUDO que o agente sabe fazer.
# Abra aqui para entender o sistema. Cada item aponta para seu arquivo detalhado.
#
# Atualizar este arquivo sempre que criar/alterar tools, receitas ou mapas.
# ============================================================================

# --- Tools: funcoes Python que executam analise real nos dados do cliente ---
tools:
  # -- Analise de impacto --
  - id: analise_impacto
    file: tools/analise_impacto.yaml
    source: backend/services/analista_tools.py:182
    summary: "Impacto completo de alteracao em campo/tabela (escrita, MsExecAuto, gatilhos, integracoes)"

  - id: analise_aumento_campo
    file: tools/analise_aumento_campo.yaml
    source: backend/services/analise_campo_chave.py:43
    summary: "Aumento de campo chave SXG (grupo, PadR chumbado, indices, MsExecAuto)"

  # -- Rastreamento de escrita --
  - id: quem_grava
    file: tools/quem_grava.yaml
    source: backend/services/analista_tools.py:974
    summary: "Quem grava em tabela/campo — pontos de escrita com origens e condicoes"

  - id: operacoes_escrita
    file: tools/operacoes_escrita.yaml
    source: backend/services/analista_tools.py:1039
    summary: "Resumo de todas operacoes de escrita na tabela (por tipo, fontes, condicionais)"

  - id: rastrear_condicao
    file: tools/rastrear_condicao.yaml
    source: backend/services/analista_tools.py:1600
    summary: "Backward trace: de onde vem uma variavel de condicao no codigo"

  # -- Informacao de dicionario --
  - id: info_tabela
    file: tools/info_tabela.yaml
    source: backend/services/analista_tools.py:1500
    summary: "Metadata da tabela (campos, indices, custom, uso real)"

  - id: ver_parametro
    file: tools/ver_parametro.yaml
    source: backend/services/analista_tools.py:450
    summary: "Consultar parametro SX6 (valor atual, descricao, variacoes por filial)"

  - id: buscar_perguntas
    file: tools/buscar_perguntas.yaml
    source: backend/services/analista_tools.py:566
    summary: "Buscar grupos de perguntas SX1 por codigo ou termo"

  - id: buscar_tabela_generica
    file: tools/buscar_tabela_generica.yaml
    source: backend/services/analista_tools.py:596
    summary: "Buscar tabelas genericas SX5 (combos)"

  # -- Busca e descoberta --
  - id: buscar_menus
    file: tools/buscar_menus.yaml
    source: backend/services/analista_tools.py:900
    summary: "Buscar rotinas nos menus do cliente por keywords"

  - id: buscar_propositos
    file: tools/buscar_propositos.yaml
    source: backend/services/analista_tools.py:1000
    summary: "Buscar fontes por proposito/descricao (resumos gerados por IA)"

  - id: buscar_pes_cliente
    file: tools/buscar_pes_cliente.yaml
    source: backend/services/analista_tools.py:381
    summary: "PEs implementados pelo cliente para rotina/modulo"

  - id: buscar_fontes_tabela
    file: tools/buscar_fontes_tabela.yaml
    source: backend/services/analista_tools.py:402
    summary: "Fontes que leem/gravam na tabela (modo: escrita, leitura, todos)"

  - id: buscar_jobs
    file: tools/buscar_jobs.yaml
    source: backend/services/analista_tools.py:620
    summary: "Jobs agendados por rotina"

  - id: buscar_schedules
    file: tools/buscar_schedules.yaml
    source: backend/services/analista_tools.py:653
    summary: "Schedules por rotina/status/codigo"

  # -- Codigo fonte --
  - id: ver_fonte_cliente
    file: tools/ver_fonte_cliente.yaml
    source: backend/services/analista_tools.py:2000
    summary: "Ler codigo real de fonte do cliente (arquivo + funcao)"

  - id: buscar_texto_fonte
    file: tools/buscar_texto_fonte.yaml
    source: backend/services/analista_tools.py
    summary: "Buscar texto/tag/variavel dentro de um fonte especifico"

  # -- Processos --
  - id: mapear_processo
    file: tools/mapear_processo.yaml
    source: backend/services/analista_tools.py:1700
    summary: "Mapa completo do processo (estados, campos companheiros, tabelas satelite)"

  - id: processos_cliente
    file: tools/processos_cliente.yaml
    source: backend/services/analista_tools.py:1800
    summary: "Listar processos de negocio detectados no cliente"

  # -- Padrao Protheus --
  - id: fonte_padrao
    file: tools/fonte_padrao.yaml
    source: backend/services/padrao_tools.py
    summary: "Metadata + funcoes de fonte PADRAO Protheus"

  - id: pes_disponiveis
    file: tools/pes_disponiveis.yaml
    source: backend/services/padrao_tools.py
    summary: "PEs disponiveis na rotina PADRAO (ExecBlocks reais)"

  - id: codigo_pe
    file: tools/codigo_pe.yaml
    source: backend/services/padrao_tools.py
    summary: "Codigo fonte onde PE e chamado no PADRAO"

  - id: buscar_funcao_padrao
    file: tools/buscar_funcao_padrao.yaml
    source: backend/services/padrao_tools.py
    summary: "Buscar funcao no padrao (assinatura, arquivo)"

  # -- Especialistas LLM --
  - id: analisar_fonte
    file: tools/analisar_fonte.yaml
    source: backend/services/code_specialist.py
    summary: "Analisar codigo ADVPL para diagnosticar problema (usa LLM)"

  - id: gerar_codigo
    file: tools/gerar_codigo.yaml
    source: backend/services/code_specialist.py
    summary: "Gerar codigo ADVPL novo — PE, User Function, MVC (usa LLM)"

